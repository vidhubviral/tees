<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch Video</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #000000, #1a1a1a);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.card {
    background: #f2f2f2;
    border-radius: 20px;
    padding: 30px;
    width: 360px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

h2 {
    margin: 10px 0;
    font-size: 20px;
}

p {
    font-size: 14px;
    color: #555;
}

/* BUTTON */
.main-btn {
    margin-top: 12px;
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    font-weight: bold;
    font-size: 15px;
    color: white;
    cursor: pointer;
    background: linear-gradient(45deg, red, orange);
    box-shadow: 0 5px 15px rgba(255,0,0,0.4);
    transition: all 0.25s ease;
}

/* HOVER */
.main-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(255,0,0,0.6);
}

/* CLICK */
.main-btn:active {
    transform: scale(0.97);
}
</style>

</head>

<body>

<div class="card">

    <h2>This Video Is Going Viral 😲</h2>
    <p>Tap the button below to watch the full video</p>

    <button class="main-btn" onclick="play1()">▶ PLAY VIDEO NOW</button>
    <button class="main-btn" onclick="play2()">🔥 WATCH FULL HD</button>
    <button class="main-btn" onclick="play3()">🚀 WATCH WITHOUT ADS</button>
    <button class="main-btn" onclick="play4()">🎬 OPEN VIDEO LINK</button>

</div>

<script>
function play1() {
    window.location.href = "https://link1.com";
}

function play2() {
    window.location.href = "https://link2.com";
}

function play3() {
    window.location.href = "https://link3.com";
}

function play4() {
    window.location.href = "https://link4.com";
}
</script>

</body>
</html>
